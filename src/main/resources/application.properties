spring.application.name=TrustChainApplication


# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/trustchain_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=archana
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

# JWT Secret (change in production)
jwt.secret=TrustChainSecretKey2024SuperSecureBase64EncodedKeyForJWT
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.trustchain=DEBUG
